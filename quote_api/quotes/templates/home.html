<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 500px;
        }

        #quote-text {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        #quote-author {
            color: gray;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="quote-text">Clique no botão para gerar uma frase</h1>
        <p id="quote-author"></p>
        <button id="new-quote-btn">Nova frase</button>
    </div>

    <div class="container">
        <input type="text" id="new-quote-text" placeholder="Frase">
        <input type="text" id="new-quote-author" placeholder="Autor da frase">
        <select id="new-quote-category" name="category" required>
            <option value="">Selecione uma categoria</option>
            <option value="motivacional">Motivacional</option>
            <option value="humor">Humor</option>
            <option value="reflexiva">Reflexiva</option>
            <option value="triste">Triste</option>
        </select>
        <button id="add-quote-btn">Criar nova frase</button>
    </div>
    <dialog id="quote-success">
        <h2>Frase enviada com sucesso</h2>
        <button id="fechar-popup">close</button>
    </dialog>

</body>
<script>
    /*frase random*/
    const quoteText = document.getElementById('quote-text');
    const quoteAuthor = document.getElementById('quote-author');

    document.getElementById('new-quote-btn').addEventListener('click', function() {
        quoteText.textContent = 'Carregando...';
        quoteAuthor.textContent = '';
        fetch('/quotes/random/')
            .then(response => response.json())
            .then(data => {
                quoteText.textContent = data.text;
                if (data.author) {
                    quoteAuthor.textContent = `- ${data.author}`;
                } else {
                    quoteAuthor.textContent = '';
                }
            })
            .catch(error => console.error('Erro ao buscar a frase:', error));
    });

    /*criar nova frase*/
    const newQuoteText = document.getElementById('new-quote-text');
    const newQuoteAuthor = document.getElementById('new-quote-author');
    const newQuoteCategory = document.getElementById('new-quote-category');

    document.getElementById('add-quote-btn').addEventListener('click', function() {
        fetch('/quotes/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                text: newQuoteText.value,
                author: newQuoteAuthor.value,
                category:newQuoteCategory.value
            })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Erro ao criar frase");
            }
            return response.json();
        })
        .then(data => {
            document.getElementById('quote-sucess').showModal();

            // limpa os campos
            newQuoteText.value = '';
            newQuoteAuthor.value = '';
            newQuoteCategory.value = '';
        })
        .catch(error => {
            console.error('Erro:', error);
        });

    });

    document.getElementById('fechar-popup').addEventListener('click', () =>{
        document.getElementById('quote-success').close()
    })
</script>
</html>
